<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pomo - A minimal, distraction-free pomodoro timer for deep work">
  <title>Pomo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
</head>
<body>
  <div class="app">
    <!-- Header with theme toggle -->
    <div class="header">
      <h1 class="app-title">Pomo</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Cycle theme">
        <span class="theme-icon theme-icon--light"></span>
        <span class="theme-icon theme-icon--dark"></span>
        <span class="theme-icon theme-icon--synthwave"></span>
      </button>
    </div>

    <!-- Timer Display -->
    <div class="timer-container">
      <svg class="progress-ring" viewBox="0 0 200 200" aria-hidden="true">
        <circle
          class="progress-ring__background"
          cx="100"
          cy="100"
          r="90"
        />
        <circle
          class="progress-ring__progress"
          cx="100"
          cy="100"
          r="90"
          id="progressRing"
        />
      </svg>
      <div class="timer-display">
        <span class="timer-time" id="timerDisplay">25:00</span>
        <span class="timer-status" id="timerStatus">Ready to focus</span>
      </div>
    </div>

    <!-- Task Intent -->
    <div class="task-intent" id="taskIntent">
      <div class="task-input-container" id="taskInputContainer">
        <input
          type="text"
          class="task-input"
          id="taskInput"
          placeholder="What are you working on?"
          maxlength="70"
          aria-label="Current task"
        >
      </div>
      <div class="task-display" id="taskDisplay" hidden>
        <span class="task-text" id="taskText"></span>
        <div class="task-actions">
          <button class="task-btn task-btn--complete" id="taskCompleteBtn">Complete</button>
          <button class="task-btn task-btn--clear" id="taskClearBtn">Clear</button>
        </div>
      </div>
      <div class="task-celebration" id="taskCelebration" hidden></div>
    </div>

    <!-- Control Buttons -->
    <div class="controls">
      <button class="btn btn--primary" id="startBtn" aria-label="Start timer">
        Start
      </button>
      <button class="btn btn--secondary" id="pauseBtn" aria-label="Pause timer" disabled>
        Pause
      </button>
      <button class="btn btn--secondary" id="resetBtn" aria-label="Reset timer">
        Reset
      </button>
      <button class="btn btn--secondary" id="skipBtn" aria-label="Skip to next session" disabled>
        Skip
      </button>
    </div>

    <!-- Preset Buttons -->
    <div class="presets">
      <button class="preset-btn active" data-work="25" data-break="5" aria-pressed="true">
        Classic
        <span class="preset-detail">25/5</span>
      </button>
      <button class="preset-btn" data-work="50" data-break="10" aria-pressed="false">
        Long
        <span class="preset-detail">50/10</span>
      </button>
      <button class="preset-btn" data-work="15" data-break="3" aria-pressed="false">
        Sprint
        <span class="preset-detail">15/3</span>
      </button>
      <button class="preset-btn preset-btn--custom" id="customPresetBtn" aria-pressed="false">
        Custom
        <span class="preset-detail" id="customPresetDetail">--/--</span>
      </button>
    </div>

    <!-- Ambient Sounds -->
    <div class="sound-controls">
      <div class="sound-buttons">
        <button class="sound-btn active" data-sound="off" aria-pressed="true">
          <span class="sound-icon sound-icon--off"></span>
          <span class="sound-label">Off</span>
        </button>
        <!-- Nature sounds (light/dark themes) -->
        <button class="sound-btn sound-btn--nature" data-sound="rain" aria-pressed="false">
          <span class="sound-icon sound-icon--rain"></span>
          <span class="sound-label">Rain</span>
        </button>
        <button class="sound-btn sound-btn--nature" data-sound="fireplace" aria-pressed="false">
          <span class="sound-icon sound-icon--fire"></span>
          <span class="sound-label">Fire</span>
        </button>
        <button class="sound-btn sound-btn--nature" data-sound="river" aria-pressed="false">
          <span class="sound-icon sound-icon--river"></span>
          <span class="sound-label">River</span>
        </button>
        <!-- Synthwave tracks (synthwave theme only) -->
        <button class="sound-btn sound-btn--synth" data-sound="synthDrive" aria-pressed="false">
          <span class="sound-icon sound-icon--drive"></span>
          <span class="sound-label">Drive</span>
        </button>
        <button class="sound-btn sound-btn--synth" data-sound="synthNeon" aria-pressed="false">
          <span class="sound-icon sound-icon--neon"></span>
          <span class="sound-label">Neon</span>
        </button>
        <button class="sound-btn sound-btn--synth" data-sound="synthGrid" aria-pressed="false">
          <span class="sound-icon sound-icon--grid"></span>
          <span class="sound-label">Grid</span>
        </button>
      </div>
      <div class="volume-control">
        <span class="volume-icon"></span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50" aria-label="Volume">
      </div>
    </div>

    <!-- Session Info -->
    <div class="session-info">
      <span class="session-count" id="sessionCount">Session #1</span>
      <span class="session-separator">•</span>
      <span class="total-time" id="totalTime">0 min focused today</span>
      <button class="stats-btn" id="statsBtn" aria-label="View statistics">📊</button>
    </div>
  </div>

  <!-- Custom Preset Modal -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
      <h2 class="modal-title" id="modalTitle">Custom Preset</h2>
      <div class="modal-content">
        <div class="input-group">
          <label for="customWorkInput">Work duration (minutes)</label>
          <input
            type="number"
            id="customWorkInput"
            min="1"
            max="120"
            value="25"
            class="number-input"
          >
        </div>
        <div class="input-group">
          <label for="customBreakInput">Break duration (minutes)</label>
          <input
            type="number"
            id="customBreakInput"
            min="1"
            max="60"
            value="5"
            class="number-input"
          >
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn--secondary" id="modalCancelBtn">Cancel</button>
        <button class="btn btn--primary" id="modalSaveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Statistics Modal -->
  <div class="modal-overlay" id="statsOverlay" aria-hidden="true">
    <div class="modal modal--stats" role="dialog" aria-labelledby="statsTitle" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="statsTitle">Statistics</h2>
        <button class="modal-close" id="statsCloseBtn" aria-label="Close">×</button>
      </div>
      <div class="modal-content">
        <!-- Summary Stats -->
        <div class="stats-summary" id="statsSummary">
          <div class="stat-card">
            <span class="stat-value" id="statToday">0</span>
            <span class="stat-label">Today</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statWeek">0</span>
            <span class="stat-label">This Week</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statMonth">0</span>
            <span class="stat-label">This Month</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statTotal">0</span>
            <span class="stat-label">All Time</span>
          </div>
        </div>
        <!-- Chart -->
        <div class="stats-chart-container">
          <h3 class="chart-title">Last 14 Days</h3>
          <div class="stats-chart" id="statsChart"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
