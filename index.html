<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pomo - A minimal, distraction-free pomodoro timer for deep work">
  <title>Pomo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
</head>
<body>
  <div class="app">
    <!-- Header with theme toggle and sound control -->
    <div class="header">
      <h1 class="app-title">Pomo</h1>
      <div class="header-controls">
        <!-- Sound Control (only visible during sessions) -->
        <div class="sound-control" id="soundControl" hidden>
          <button class="sound-toggle" id="soundToggle" aria-label="Toggle soundscape menu" aria-expanded="false">
            <span class="sound-toggle-icon"></span>
          </button>
          <div class="sound-dropdown" id="soundDropdown" hidden>
            <div class="sound-dropdown-header">Soundscape</div>
            <div class="sound-options">
              <button class="sound-option active" data-sound="off" aria-pressed="true">
                <span class="sound-option-icon sound-option-icon--off"></span>
                <span>Off</span>
              </button>
              <!-- Nature sounds (light/dark themes) -->
              <button class="sound-option sound-option--nature" data-sound="rain" aria-pressed="false">
                <span class="sound-option-icon sound-option-icon--rain"></span>
                <span>Rain on Tent</span>
              </button>
              <button class="sound-option sound-option--nature" data-sound="fireplace" aria-pressed="false">
                <span class="sound-option-icon sound-option-icon--fire"></span>
                <span>Fireplace</span>
              </button>
              <button class="sound-option sound-option--nature" data-sound="forest" aria-pressed="false">
                <span class="sound-option-icon sound-option-icon--forest"></span>
                <span>Forest</span>
              </button>
              <!-- Synthwave tracks (synthwave theme only) -->
              <button class="sound-option sound-option--synth" data-sound="synthDrive" aria-pressed="false">
                <span class="sound-option-icon sound-option-icon--drive"></span>
                <span>Neon Drive</span>
              </button>
              <button class="sound-option sound-option--synth" data-sound="synthNeon" aria-pressed="false">
                <span class="sound-option-icon sound-option-icon--neon"></span>
                <span>Midnight</span>
              </button>
              <button class="sound-option sound-option--synth" data-sound="synthGrid" aria-pressed="false">
                <span class="sound-option-icon sound-option-icon--grid"></span>
                <span>Retrowave</span>
              </button>
            </div>
            <div class="sound-volume">
              <span class="volume-icon"></span>
              <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50" aria-label="Volume">
            </div>
          </div>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Cycle theme">
          <span class="theme-icon theme-icon--light"></span>
          <span class="theme-icon theme-icon--dark"></span>
          <span class="theme-icon theme-icon--synthwave"></span>
        </button>
      </div>
    </div>

    <!-- Timer Display -->
    <div class="timer-container">
      <svg class="progress-ring" viewBox="0 0 200 200" aria-hidden="true">
        <circle
          class="progress-ring__background"
          cx="100"
          cy="100"
          r="90"
        />
        <circle
          class="progress-ring__progress"
          cx="100"
          cy="100"
          r="90"
          id="progressRing"
        />
      </svg>
      <div class="timer-display" id="timerDisplayContainer">
        <div class="timer-time-row">
          <button class="time-arrow" id="decreaseBtn" aria-label="Decrease time">‹</button>
          <span class="timer-time" id="timerDisplay">25:00</span>
          <button class="time-arrow" id="increaseBtn" aria-label="Increase time">›</button>
        </div>
        <span class="timer-status" id="timerStatus">Ready to focus</span>
      </div>
    </div>

    <!-- Control Buttons -->
    <div class="controls">
      <button class="btn btn--primary" id="startBtn" aria-label="Start timer">
        Start
      </button>
      <button class="btn btn--secondary" id="pauseBtn" aria-label="Pause timer" hidden>
        Pause
      </button>
      <button class="btn btn--primary" id="continueBtn" aria-label="Continue timer" hidden>
        Continue
      </button>
      <button class="btn btn--secondary" id="doneBtn" aria-label="End session early" hidden>
        Done
      </button>
      <button class="btn btn--secondary btn--danger" id="abandonBtn" aria-label="Abandon session" hidden>
        Abandon
      </button>
      <button class="btn btn--secondary" id="skipBtn" aria-label="Skip to next session" hidden>
        Skip
      </button>
    </div>

    <!-- Session Info -->
    <div class="session-info">
      <div class="goal-progress" id="goalProgress">
        <div class="goal-progress-bar-container">
          <div class="goal-progress-bar" id="goalProgressBar"></div>
        </div>
        <span class="goal-progress-text" id="goalProgressText">0 / 90 min</span>
      </div>
      <div class="session-buttons">
        <button class="stats-btn" id="statsBtn" aria-label="View statistics">📊</button>
        <button class="settings-btn" id="settingsBtn" aria-label="Settings">⚙️</button>
      </div>
    </div>
  </div>

  <!-- Task Sidebar -->
  <div class="task-sidebar" id="taskSidebar">
    <!-- Sidebar Tab (visible when closed) -->
    <button class="sidebar-tab" id="sidebarTab" aria-label="Open task list">
      <span class="sidebar-tab-icon">☰</span>
    </button>

    <!-- Sidebar Panel -->
    <div class="sidebar-panel" id="sidebarPanel">
      <div class="sidebar-header">
        <h2 class="sidebar-title">Tasks</h2>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">×</button>
      </div>

      <!-- Daily Progress Bar -->
      <div class="daily-progress">
        <div class="daily-progress-bar-container">
          <div class="daily-progress-bar" id="dailyProgressBar"></div>
        </div>
        <span class="daily-progress-text" id="dailyProgressText">0m / -</span>
      </div>

      <!-- Add Task Form -->
      <div class="add-task-form">
        <input
          type="text"
          class="add-task-input"
          id="addTaskInput"
          placeholder="Add a task... (Enter to add)"
          maxlength="100"
          aria-label="New task name"
        >
        <select class="add-task-estimate" id="addTaskEstimate" aria-label="Estimated time">
          <option value="">Est.</option>
          <option value="5">5m</option>
          <option value="10">10m</option>
          <option value="15">15m</option>
          <option value="20">20m</option>
          <option value="25">25m</option>
          <option value="30">30m</option>
          <option value="35">35m</option>
          <option value="40">40m</option>
          <option value="45">45m</option>
          <option value="50">50m</option>
          <option value="55">55m</option>
          <option value="60">60m</option>
          <option value="90">90m</option>
          <option value="120">120m</option>
        </select>
      </div>

      <!-- Task List -->
      <div class="task-list" id="taskList">
        <!-- Tasks will be rendered here -->
      </div>
    </div>
  </div>

  <!-- Statistics Modal -->
  <div class="modal-overlay" id="statsOverlay" aria-hidden="true">
    <div class="modal modal--stats" role="dialog" aria-labelledby="statsTitle" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="statsTitle">Statistics</h2>
        <div class="stats-toggle">
          <button class="stats-toggle-btn active" data-view="sessions" aria-pressed="true">Sessions</button>
          <button class="stats-toggle-btn" data-view="minutes" aria-pressed="false">Minutes</button>
        </div>
        <button class="modal-close" id="statsCloseBtn" aria-label="Close">×</button>
      </div>
      <div class="modal-content">
        <!-- Summary Stats -->
        <div class="stats-summary" id="statsSummary">
          <div class="stat-card">
            <span class="stat-value" id="statToday">0</span>
            <span class="stat-label">Today</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statWeek">0</span>
            <span class="stat-label">This Week</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statMonth">0</span>
            <span class="stat-label">This Month</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statTotal">0</span>
            <span class="stat-label">All Time</span>
          </div>
        </div>
        <!-- Streak Stats -->
        <div class="stats-streaks">
          <div class="streak-card">
            <span class="streak-icon">🔥</span>
            <span class="streak-value" id="currentStreak">0</span>
            <span class="streak-label">Current Streak</span>
          </div>
          <div class="streak-card">
            <span class="streak-icon">🏆</span>
            <span class="streak-value" id="longestStreak">0</span>
            <span class="streak-label">Longest Streak</span>
          </div>
        </div>
        <!-- Chart -->
        <div class="stats-chart-container">
          <h3 class="chart-title">Last 14 Days</h3>
          <div class="stats-chart" id="statsChart"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsOverlay" aria-hidden="true">
    <div class="modal modal--settings" role="dialog" aria-labelledby="settingsTitle" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="settingsTitle">Settings</h2>
        <button class="modal-close" id="settingsCloseBtn" aria-label="Close">×</button>
      </div>
      <div class="modal-content">
        <div class="settings-group">
          <h3 class="settings-group-title">Timer</h3>
          <div class="settings-row">
            <span class="settings-label">Break duration</span>
            <div class="settings-stepper">
              <button class="stepper-btn stepper-btn--sm" id="breakDecreaseBtn" aria-label="Decrease break time">-</button>
              <span class="settings-value" id="breakDurationDisplay">5 min</span>
              <button class="stepper-btn stepper-btn--sm" id="breakIncreaseBtn" aria-label="Increase break time">+</button>
            </div>
          </div>
        </div>
        <div class="settings-group">
          <h3 class="settings-group-title">Tasks</h3>
          <div class="settings-row">
            <span class="settings-label">Show completed tasks</span>
            <label class="settings-toggle">
              <input type="checkbox" id="showCompletedToggle" checked>
              <span class="settings-toggle-slider"></span>
            </label>
          </div>
          <div class="settings-row">
            <span class="settings-label">On task completion</span>
            <select class="settings-select" id="taskCompletionSelect">
              <option value="nextTask">Start next task</option>
              <option value="endSession">End session</option>
            </select>
          </div>
        </div>
        <div class="settings-group">
          <h3 class="settings-group-title">Daily Goal</h3>
          <div class="settings-row">
            <span class="settings-label">Focus goal</span>
            <select class="settings-select" id="dailyGoalSelect">
              <option value="30">30 min</option>
              <option value="60">1 hour</option>
              <option value="90">1.5 hours</option>
              <option value="120">2 hours</option>
              <option value="150">2.5 hours</option>
              <option value="180">3 hours</option>
              <option value="240">4 hours</option>
              <option value="300">5 hours</option>
              <option value="360">6 hours</option>
              <option value="480">8 hours</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
