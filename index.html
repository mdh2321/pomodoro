<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pomo - A minimal, distraction-free pomodoro timer for deep work">
  <title>Pomo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
</head>
<body>
  <div class="app">
    <!-- Task Label -->
    <div class="task-section">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="What are you working on?"
        maxlength="100"
        aria-label="Current task description"
      >
    </div>

    <!-- Timer Display -->
    <div class="timer-container">
      <svg class="progress-ring" viewBox="0 0 200 200" aria-hidden="true">
        <circle
          class="progress-ring__background"
          cx="100"
          cy="100"
          r="90"
        />
        <circle
          class="progress-ring__progress"
          cx="100"
          cy="100"
          r="90"
          id="progressRing"
        />
      </svg>
      <div class="timer-display">
        <span class="timer-time" id="timerDisplay">25:00</span>
        <span class="timer-status" id="timerStatus">Ready to focus</span>
      </div>
    </div>

    <!-- Control Buttons -->
    <div class="controls">
      <button class="btn btn--primary" id="startBtn" aria-label="Start timer">
        Start
      </button>
      <button class="btn btn--secondary" id="pauseBtn" aria-label="Pause timer" disabled>
        Pause
      </button>
      <button class="btn btn--secondary" id="resetBtn" aria-label="Reset timer">
        Reset
      </button>
      <button class="btn btn--secondary" id="skipBtn" aria-label="Skip to next session" disabled>
        Skip
      </button>
    </div>

    <!-- Preset Buttons -->
    <div class="presets">
      <button class="preset-btn active" data-work="25" data-break="5" aria-pressed="true">
        Classic
        <span class="preset-detail">25/5</span>
      </button>
      <button class="preset-btn" data-work="50" data-break="10" aria-pressed="false">
        Long Focus
        <span class="preset-detail">50/10</span>
      </button>
      <button class="preset-btn" data-work="15" data-break="3" aria-pressed="false">
        Short Sprint
        <span class="preset-detail">15/3</span>
      </button>
      <button class="preset-btn preset-btn--custom" id="customPresetBtn" aria-pressed="false">
        Custom
        <span class="preset-detail" id="customPresetDetail">--/--</span>
      </button>
    </div>

    <!-- Session Info -->
    <div class="session-info">
      <span class="session-count" id="sessionCount">Session #1</span>
      <span class="session-separator">•</span>
      <span class="total-time" id="totalTime">0 min focused today</span>
    </div>
  </div>

  <!-- Custom Preset Modal -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
      <h2 class="modal-title" id="modalTitle">Custom Preset</h2>
      <div class="modal-content">
        <div class="input-group">
          <label for="customWorkInput">Work duration (minutes)</label>
          <input
            type="number"
            id="customWorkInput"
            min="1"
            max="120"
            value="25"
            class="number-input"
          >
        </div>
        <div class="input-group">
          <label for="customBreakInput">Break duration (minutes)</label>
          <input
            type="number"
            id="customBreakInput"
            min="1"
            max="60"
            value="5"
            class="number-input"
          >
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn--secondary" id="modalCancelBtn">Cancel</button>
        <button class="btn btn--primary" id="modalSaveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Audio for notifications -->
  <audio id="notificationSound" preload="auto">
    <source src="sounds/chime.mp3" type="audio/mpeg">
  </audio>

  <script src="app.js"></script>
</body>
</html>
